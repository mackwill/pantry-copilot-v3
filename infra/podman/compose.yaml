services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build:
      context: ../..
      dockerfile: services/api/Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://pantry:pantry@postgres:5432/pantry
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      BETTER_AUTH_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://ai:4001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?set in .env}
    ports:
      - "4000:4000"
  ai:
    build:
      context: ../..
      dockerfile: services/ai/Containerfile
    environment:
      PORT: 4001
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?set in .env}
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-mock}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "4001:4001"
volumes:
  pgdata:
