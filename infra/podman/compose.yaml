services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build:
      context: ../..
      dockerfile: services/api/Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    # Secrets + provider config come from the root .env (override with ENV_FILE).
    env_file:
      - ${ENV_FILE:-../../.env}
    # Container-network overrides take precedence over env_file values.
    environment:
      DATABASE_URL: postgres://pantry:pantry@postgres:5432/pantry
      BETTER_AUTH_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      AI_SERVICE_URL: http://ai:4001
    ports:
      - "4000:4000"
  ai:
    build:
      context: ../..
      dockerfile: services/ai/Containerfile
    env_file:
      - ${ENV_FILE:-../../.env}
    environment:
      PORT: 4001
    ports:
      - "4001:4001"
volumes:
  pgdata:
