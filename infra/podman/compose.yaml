services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
